<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cycle Syncing Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1E0A2E;
      --surface: #2A1040;
      --surface2: #341550;
      --cream: #F5EDE0;
      --cream-muted: #C8B8A8;
      --gold: #C9A84C;
      --lavender: #7B6B8D;
      --rose: #E8A0A0;
      --phase-menstrual: #C94040;
      --phase-follicular: #5A9E6F;
      --phase-ovulatory: #C9A84C;
      --phase-luteal: #8B6BAE;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header .eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 8px;
    }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--cream);
      letter-spacing: 0.04em;
    }

    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 580px;
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 12px;
    }

    /* Phase picker */
    .phase-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 28px;
    }
    .phase-btn {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 12px 6px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
      color: var(--cream-muted);
    }
    .phase-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--cream); }
    .phase-btn.active { color: var(--cream); }
    .phase-btn.active[data-phase="menstrual"] { background: rgba(201,64,64,0.15); border-color: var(--phase-menstrual); }
    .phase-btn.active[data-phase="follicular"] { background: rgba(90,158,111,0.15); border-color: var(--phase-follicular); }
    .phase-btn.active[data-phase="ovulatory"]  { background: rgba(201,168,76,0.15); border-color: var(--phase-ovulatory); }
    .phase-btn.active[data-phase="luteal"]     { background: rgba(139,107,174,0.15); border-color: var(--phase-luteal); }
    .phase-btn .phase-icon { font-size: 20px; display: block; margin-bottom: 5px; }
    .phase-btn .phase-name { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; display: block; }

    /* Scores */
    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .score-box {
      background: var(--surface2);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .score-box .score-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 6px;
    }
    .score-box .score-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
    }
    .score-box .score-value.muted { font-size: 18px; color: var(--lavender); font-family: 'DM Sans', sans-serif; }
    .score-box .score-value.err   { font-size: 13px; color: var(--rose); font-family: 'DM Sans', sans-serif; }
    .score-box .score-sub { font-size: 10px; color: var(--lavender); margin-top: 4px; }

    .scores-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .last-updated { font-size: 10px; color: var(--lavender); }
    .refresh-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--lavender);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--cream); }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin-bottom: 24px; }

    /* Phase display */
    .phase-display {
      text-align: center;
      margin-bottom: 24px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .phase-display .phase-eyebrow {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 8px;
    }
    .phase-display .phase-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 48px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.02em;
      line-height: 1;
      transition: color 0.4s ease;
      color: var(--cream-muted);
    }
    .phase-display .phase-title.menstrual { color: var(--phase-menstrual); }
    .phase-display .phase-title.follicular { color: var(--phase-follicular); }
    .phase-display .phase-title.ovulatory  { color: var(--phase-ovulatory); }
    .phase-display .phase-title.luteal     { color: var(--phase-luteal); }
    .phase-display .phase-subtitle { font-size: 11px; color: var(--lavender); margin-top: 6px; letter-spacing: 0.06em; }

    /* Generate button */
    .generate-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--surface2);
      color: var(--cream-muted);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .generate-btn.ready {
      background: linear-gradient(135deg, #341550, #4A1A6E);
      color: var(--cream);
      border-color: rgba(139,107,174,0.4);
    }
    .generate-btn.ready:hover {
      background: linear-gradient(135deg, #3D1860, #572080);
      border-color: rgba(139,107,174,0.7);
    }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Response card */
    .response-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 580px;
      border: 1px solid rgba(255,255,255,0.06);
      display: none;
    }
    .response-card.visible { display: block; }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .response-header .response-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      font-style: italic;
      color: var(--cream);
    }
    .response-header .response-phase-tag {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 500;
    }
    .response-phase-tag.menstrual { background: rgba(201,64,64,0.15); color: var(--phase-menstrual); border: 1px solid rgba(201,64,64,0.3); }
    .response-phase-tag.follicular { background: rgba(90,158,111,0.15); color: var(--phase-follicular); border: 1px solid rgba(90,158,111,0.3); }
    .response-phase-tag.ovulatory  { background: rgba(201,168,76,0.15); color: var(--phase-ovulatory); border: 1px solid rgba(201,168,76,0.3); }
    .response-phase-tag.luteal     { background: rgba(139,107,174,0.15); color: var(--phase-luteal); border: 1px solid rgba(139,107,174,0.3); }

    .response-body {
      font-size: 14px;
      line-height: 1.75;
      color: var(--cream-muted);
      white-space: pre-wrap;
    }

    /* Loading state */
    .loading-state {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 32px 0;
      gap: 12px;
    }
    .loading-state.visible { display: flex; }
    .loading-dots {
      display: flex;
      gap: 6px;
    }
    .loading-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lavender);
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    .loading-label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--lavender);
    }

    /* Follow-up */
    .followup-area {
      margin-top: 24px;
      display: none;
    }
    .followup-area.visible { display: block; }
    .followup-input-row {
      display: flex;
      gap: 8px;
    }
    .followup-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .followup-input::placeholder { color: var(--lavender); }
    .followup-input:focus { border-color: rgba(139,107,174,0.5); }
    .followup-send {
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--lavender);
      padding: 12px 16px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
    }
    .followup-send:hover { border-color: rgba(139,107,174,0.5); color: var(--cream); }

    .error-msg {
      background: rgba(201,64,64,0.1);
      border: 1px solid rgba(201,64,64,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: var(--rose);
      line-height: 1.5;
      margin-top: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }

    @keyframes glow-pulse {
      0%, 100% { text-shadow: 0 0 20px currentColor; opacity: 1; }
      50% { text-shadow: 0 0 40px currentColor; opacity: 0.85; }
    }
    .phase-title.glowing { animation: glow-pulse 3s ease-in-out infinite; }

    @media (max-width: 480px) {
      .phase-grid { grid-template-columns: repeat(2, 1fr); }
      .phase-display .phase-title { font-size: 36px; }
      .score-box .score-value { font-size: 34px; }
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">@holistichottiejaz</p>
    <h1>Cycle Syncing Coach</h1>
  </header>

  <!-- Main card -->
  <div class="card">
    <p class="section-label">Your phase today</p>
    <div class="phase-grid">
      <button class="phase-btn" data-phase="menstrual">
        <span class="phase-icon">🔴</span>
        <span class="phase-name">Menstrual</span>
      </button>
      <button class="phase-btn" data-phase="follicular">
        <span class="phase-icon">🌱</span>
        <span class="phase-name">Follicular</span>
      </button>
      <button class="phase-btn" data-phase="ovulatory">
        <span class="phase-icon">✨</span>
        <span class="phase-name">Ovulatory</span>
      </button>
      <button class="phase-btn" data-phase="luteal">
        <span class="phase-icon">🌙</span>
        <span class="phase-name">Luteal</span>
      </button>
    </div>

    <div class="scores">
      <div class="score-box">
        <div class="score-label">Readiness</div>
        <div class="score-value muted" id="readiness-score">—</div>
        <div class="score-sub" id="readiness-date"></div>
      </div>
      <div class="score-box">
        <div class="score-label">Sleep</div>
        <div class="score-value muted" id="sleep-score">—</div>
        <div class="score-sub" id="sleep-date"></div>
      </div>
    </div>

    <div class="scores-footer">
      <span class="last-updated" id="last-updated">Fetching your data...</span>
      <button class="refresh-btn" onclick="fetchOuraData()">↻ Refresh</button>
    </div>

    <div class="divider"></div>

    <div class="phase-display">
      <p class="phase-eyebrow">You are in</p>
      <p class="phase-title" id="phase-title">—</p>
      <p class="phase-subtitle" id="phase-subtitle">Select your phase above</p>
    </div>

    <button class="generate-btn" id="generate-btn" disabled onclick="generateCheckIn()">
      Select your phase to get your check-in
    </button>

    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- Response card -->
  <div class="response-card" id="response-card">
    <div class="response-header">
      <span class="response-title">Your daily check-in</span>
      <span class="response-phase-tag" id="response-phase-tag"></span>
    </div>

    <div class="loading-state" id="loading-state">
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>
      <p class="loading-label" id="loading-label">Reading your body data...</p>
    </div>

    <div class="response-body" id="response-body"></div>

    <div class="followup-area" id="followup-area">
      <div class="divider" style="margin-top:20px;"></div>
      <div class="followup-input-row" style="margin-top:16px;">
        <input class="followup-input" id="followup-input" placeholder="Ask a follow-up..." />
        <button class="followup-send" onclick="sendFollowUp()">↑</button>
      </div>
    </div>
  </div>

  <script>
    const PROXY = 'https://oura-proxy-omega.vercel.app/api/oura';
    const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';

    let currentPhase = null;
    let readinessScore = null;
    let sleepScore = null;
    let conversationHistory = [];

    const LOADING_LABELS = [
      'Reading your body data...',
      'Checking your scores...',
      'Asking your cycle coach...',
      'Putting it all together...',
    ];

    const PHASE_META = {
      menstrual:  { subtitle: 'Days 1–5 · Rest & nourish' },
      follicular: { subtitle: 'Days 6–13 · Rising energy' },
      ovulatory:  { subtitle: 'Days 14–16 · Peak energy' },
      luteal:     { subtitle: 'Days 17–28 · Inward & editing' },
    };

    function getDateRange(daysBack) {
      const end = new Date();
      const start = new Date();
      start.setDate(start.getDate() - daysBack);
      const fmt = d => d.toISOString().split('T')[0];
      return { start: fmt(start), end: fmt(end) };
    }

    async function fetchOuraData() {
      document.getElementById('last-updated').textContent = 'Fetching your data...';
      const rEl = document.getElementById('readiness-score');
      const sEl = document.getElementById('sleep-score');
      rEl.className = 'score-value muted'; rEl.textContent = '…';
      sEl.className = 'score-value muted'; sEl.textContent = '…';

      const r7 = getDateRange(7);
      const r3 = getDateRange(3);

      const [readinessRes, sleepRes] = await Promise.allSettled([
        fetch(`${PROXY}?endpoint=daily_readiness&start_date=${r7.start}&end_date=${r7.end}`).then(r => r.json()),
        fetch(`${PROXY}?endpoint=daily_sleep&start_date=${r3.start}&end_date=${r3.end}`).then(r => r.json()),
      ]);

      if (readinessRes.status === 'fulfilled' && readinessRes.value?.data?.length) {
        const latest = readinessRes.value.data.at(-1);
        readinessScore = latest.score;
        rEl.className = 'score-value';
        rEl.textContent = readinessScore;
        document.getElementById('readiness-date').textContent = latest.day;
      } else {
        readinessScore = null;
        rEl.className = 'score-value err';
        rEl.textContent = 'unavailable';
      }

      if (sleepRes.status === 'fulfilled' && sleepRes.value?.data?.length) {
        const latest = sleepRes.value.data.at(-1);
        sleepScore = latest.score;
        sEl.className = 'score-value';
        sEl.textContent = sleepScore;
        document.getElementById('sleep-date').textContent = latest.day;
      } else {
        sleepScore = null;
        sEl.className = 'score-value err';
        sEl.textContent = 'unavailable';
      }

      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Updated ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
    }

    function setPhase(phase) {
      currentPhase = phase;

      document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.phase-btn[data-phase="${phase}"]`).classList.add('active');

      const titleEl = document.getElementById('phase-title');
      titleEl.textContent = phase.charAt(0).toUpperCase() + phase.slice(1);
      titleEl.className = `phase-title glowing ${phase}`;
      document.getElementById('phase-subtitle').textContent = PHASE_META[phase].subtitle;

      const btn = document.getElementById('generate-btn');
      btn.disabled = false;
      btn.className = 'generate-btn ready';
      btn.textContent = 'Get my cycle check-in →';

      conversationHistory = [];
    }

    function buildSystemPrompt() {
      return `You are Jazmin's personal Cycle Syncing Coach — warm, direct, knowledgeable, and Jazmin-coded. Think: best friend who has a nutrition degree and knows her Oura data. Not clinical. Not preachy. Real.

Jazmin is a holistic nutritionist, content creator (@holistichottiejaz on Instagram), and documentation specialist. Her brand pillars are: sovereignty, slow living, cycle health, holistic wellness, kitchen gardening, and intentional living. She is spiritually grounded but non-religious.

Your job: give her phase-specific, biometric-informed daily guidance across food, movement, energy management, and content creation.

PHASE KNOWLEDGE:

MENSTRUAL (Days 1–5): Lowest energy. Iron-rich foods, warming foods, anti-inflammatory. Gentle movement only — yin yoga, walking, stretching. Protect solo time and stillness. Content mode: Planning & Reflection — not filming. Brand pillars: stillness, cycle health, sovereignty.

FOLLICULAR (Days 6–13): Rising energy. Light fresh foods, fermented foods, estrogen-supporting (flaxseed, cruciferous veg). Increase workout intensity. Start new projects, make decisions. Content mode: Filming — primary production window. Batch film. Brand pillars: sovereignty, kitchen gardening, holistic wellness.

OVULATORY (Days 14–16): Peak energy and charisma. Liver-supporting foods, zinc-rich foods, avoid excess sugar/alcohol. Max intensity movement. Ideal for launches, events, hosting, dinner parties. Content mode: Filming & Posting — peak visibility window. Brand pillars: confidence, cycle health, hosting/home life.

LUTEAL (Days 17–28): Declining energy. Complex carbs, magnesium-rich foods, progesterone-supporting. Early luteal: moderate movement. Late luteal: walks and stretching only. Detail work and editing. Cancel low-value social obligations guilt-free. Content mode: Editing — write captions, schedule posts, plan next cycle. Brand pillars: slow living, home life, emotional processing.

OUTPUT FORMAT — always structure like this:
📍 YOUR PHASE: [Phase]
📅 Readiness: [score]/100 | Sleep: [score]/100

Then give warm, practical recs under these sections:
🥗 WHAT TO EAT (3–5 food category bullets)
🏃 HOW TO MOVE (2–3 recs matched to energy)
⚡ ENERGY + REST (2–3 practical notes)
📲 CONTENT MODE FOR @holistichottiejaz (mode name + brief explanation + 1–2 content angle ideas)

If readiness is under 65, lead with a note about that and soften all recs accordingly.
Never give specific meal plans — food categories only.
Never assume a 28-day cycle.
Keep it under 350 words. Warm, direct, real.`;
    }

    function buildUserMessage() {
      const phase = currentPhase.charAt(0).toUpperCase() + currentPhase.slice(1);
      const readiness = readinessScore !== null ? `${readinessScore}/100` : 'unavailable';
      const sleep = sleepScore !== null ? `${sleepScore}/100` : 'unavailable';
      return `My phase today: ${phase}\nReadiness score: ${readiness}\nSleep score: ${sleep}\n\nGive me my daily cycle check-in.`;
    }

    async function callClaude(messages) {
      const res = await fetch(ANTHROPIC_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: buildSystemPrompt(),
          messages,
        }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      return data.content?.find(b => b.type === 'text')?.text || '';
    }

    function animateLoadingLabel() {
      let i = 0;
      const el = document.getElementById('loading-label');
      const interval = setInterval(() => {
        i = (i + 1) % LOADING_LABELS.length;
        el.textContent = LOADING_LABELS[i];
      }, 1200);
      return interval;
    }

    async function generateCheckIn() {
      if (!currentPhase) return;

      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.textContent = 'Getting your check-in...';

      const responseCard = document.getElementById('response-card');
      const loadingState = document.getElementById('loading-state');
      const responseBody = document.getElementById('response-body');
      const followupArea = document.getElementById('followup-area');
      const errorMsg = document.getElementById('error-msg');

      responseCard.classList.add('visible');
      loadingState.classList.add('visible');
      responseBody.textContent = '';
      followupArea.classList.remove('visible');
      errorMsg.classList.remove('visible');

      const phaseTag = document.getElementById('response-phase-tag');
      phaseTag.textContent = currentPhase;
      phaseTag.className = `response-phase-tag ${currentPhase}`;

      const labelInterval = animateLoadingLabel();

      try {
        const userMsg = buildUserMessage();
        conversationHistory = [{ role: 'user', content: userMsg }];

        const reply = await callClaude(conversationHistory);
        conversationHistory.push({ role: 'assistant', content: reply });

        loadingState.classList.remove('visible');
        responseBody.textContent = reply;
        followupArea.classList.add('visible');

        btn.disabled = false;
        btn.textContent = '↺ Regenerate check-in';

        responseCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } catch (err) {
        loadingState.classList.remove('visible');
        errorMsg.textContent = `Something went wrong: ${err.message}`;
        errorMsg.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Get my cycle check-in →';
      } finally {
        clearInterval(labelInterval);
      }
    }

    async function sendFollowUp() {
      const input = document.getElementById('followup-input');
      const text = input.value.trim();
      if (!text || !conversationHistory.length) return;

      input.value = '';
      input.disabled = true;

      const responseBody = document.getElementById('response-body');
      const loadingState = document.getElementById('loading-state');
      const errorMsg = document.getElementById('error-msg');
      errorMsg.classList.remove('visible');

      loadingState.classList.add('visible');
      document.getElementById('loading-label').textContent = 'Thinking...';

      conversationHistory.push({ role: 'user', content: text });

      try {
        const reply = await callClaude(conversationHistory);
        conversationHistory.push({ role: 'assistant', content: reply });
        loadingState.classList.remove('visible');
        responseBody.textContent += `\n\n— — —\n\n${reply}`;
      } catch (err) {
        loadingState.classList.remove('visible');
        errorMsg.textContent = `Something went wrong: ${err.message}`;
        errorMsg.classList.add('visible');
        conversationHistory.pop();
      } finally {
        input.disabled = false;
        input.focus();
      }
    }

    document.querySelectorAll('.phase-btn').forEach(btn => {
      btn.addEventListener('click', () => setPhase(btn.dataset.phase));
    });

    document.getElementById('followup-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendFollowUp();
    });

    fetchOuraData();
  </script>
</body>
</html>
